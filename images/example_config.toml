output = "output.png"
gap = 20
background = "#ffffff"

# Optional: global font path override. If unset, the script searches for
# Helvetica, Arial, DejaVuSans-Bold, etc.
# font_path = "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"

[[images]]
file = "before.png"

  [[images.texts]]
  x = 100
  y = 50
  content = "BEFORE"
  font_size = 70

[[images]]
file = "after.png"

  [[images.ovals]]
  x = 270
  y = 910
  width = 100
  height = 40

  [[images.texts]]
  x = 90
  y = 40
  content = "AFTER"
  font_size = 70

[[images]]
file = "destination.png"

  [[images.texts]]
  x = 90
  y = 40
  content = "WHERE IT\nTAKES YOU"
  font_size = 70
